name: Publish Instagram Post

# Dispara quando um PR da automação semanal é mergeado na main
on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'content/weekly-posts/*.json'

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Garante que pega o código mergeado

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Find latest post JSON
        id: find-post
        run: |
          LATEST=$(ls -1 content/weekly-posts/*.json 2>/dev/null | sort -r | head -1)
          if [ -z "$LATEST" ]; then
            echo "No JSON files found in content/weekly-posts/"
            exit 1
          fi
          echo "post_path=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Found latest post: $LATEST"
          cat "$LATEST"

      - name: Publish to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          POST_JSON_PATH: ${{ steps.find-post.outputs.post_path }}
        run: |
          if [ -z "$IG_USER_ID" ] || [ -z "$IG_ACCESS_TOKEN" ]; then
            echo "⚠️  IG_USER_ID ou IG_ACCESS_TOKEN não configurados."
            echo "Configure em Settings > Secrets and variables > Actions."
            echo "Pulando publicação."
            exit 0
          fi
          python -u scripts/publish_instagram.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Falha na publicação do Instagram."
          echo "Verifique os logs acima para detalhes."
          echo "Possíveis causas:"
          echo "  - Token expirado (regenere em Meta for Developers)"
          echo "  - Imagem inacessível"
          echo "  - Limites da API atingidos"
