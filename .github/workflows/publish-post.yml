name: Publish Instagram Post

# Dispara quando um PR da automação diária é mergeado na main
on:
  push:
    branches: [main]
    paths:
      - 'content/daily-posts/*.json'
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'content/daily-posts/*.json'

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (For Video Generation)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install python dependencies
        run: pip install -r requirements.txt

      - name: Find latest post JSON
        id: find-post
        run: |
          LATEST=$(ls -1 content/daily-posts/*.json 2>/dev/null | sort -r | head -1)
          if [ -z "$LATEST" ]; then
            echo "No JSON files found in content/daily-posts/"
            exit 1
          fi
          echo "post_path=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Found latest post: $LATEST"
          cat "$LATEST"

      - name: Publish to Instagram
        id: pub
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          POST_JSON_PATH: ${{ steps.find-post.outputs.post_path }}
        run: |
          if [ -z "$IG_USERNAME" ] || [ -z "$IG_PASSWORD" ]; then
            echo "⚠️  IG_USERNAME ou IG_PASSWORD não configurados."
            echo "Configure em Settings > Secrets and variables > Actions."
            echo "Pulando publicação."
            exit 0
          fi
          python -u scripts/publish_instagram.py

      - name: Send Telegram Notification (Success)
        if: success() && steps.pub.outputs.ig_url != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LIVE_URL: ${{ steps.pub.outputs.ig_url }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            MSG="🎉 Seu post foi publicado com sucesso no Instagram!%0AConfira ao vivo:%0A${LIVE_URL}"
            curl -s -X GET "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                 -d "chat_id=${TELEGRAM_CHAT_ID}" \
                 -d "text=${MSG}" || true
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Falha na publicação do Instagram."
          echo "Verifique os logs acima para detalhes."
          echo "Possíveis causas:"
          echo "  - Credenciais incorretas"
          echo "  - 2FA ativado no Instagram (desative temporariamente)"
          echo "  - Instagram bloqueou login de IP desconhecido"
          echo "  - Faltando arquivos do MoviePy ou OpenAI Key para domingos"
