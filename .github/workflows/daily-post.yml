name: Daily Post Draft

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      query:
        description: "Consulta ou tema manual"
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$GOOGLE_API_KEY" ]; then
            echo "Missing AI secrets." >&2
            exit 1
          fi
          QUERY="${{ github.event.inputs.query }}"
          if [ -z "$QUERY" ]; then QUERY="auto"; fi
          python -u scripts/daily_post.py --require-any-ai --fallback-to-draft-on-all-fail --fallback-on-openai-error --ai-provider-order "openai,anthropic,gemini" --query "$QUERY"

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        continue-on-error: true
        with:
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          commit-message: "chore: gerar rascunho de post diário"
          title: "Rascunho: Post Diário (Instagram)"
          body: "Gerado automaticamente pelo workflow diário. Por favor, revise as informações e faça o merge para publicar."
          branch: "automation/daily-post"
          labels: automation
          add-paths: |
            content/daily-posts/*.md
            content/daily-posts/*.json

      - name: Send Telegram Notification
        if: steps.cpr.outputs.pull-request-url != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          python scripts/send_telegram.py
