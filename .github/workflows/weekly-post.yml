name: Weekly Post Draft

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      query:
        description: "Consulta para escolher artigo"
        required: false
        default: "orofacial harmonization benefits"

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$GOOGLE_API_KEY" ]; then
            echo "Missing secrets. Configure pelo menos 1: OPENAI_API_KEY, ANTHROPIC_API_KEY ou GOOGLE_API_KEY em Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi
          QUERY="${{ github.event.inputs.query }}"
          if [ -z "$QUERY" ]; then QUERY="harmonização facial benefícios"; fi
          python -u scripts/weekly_post.py --require-any-ai --fallback-to-draft-on-all-fail --fallback-on-openai-error --ai-provider-order "openai,anthropic,gemini" --query "$QUERY"

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        continue-on-error: true
        with:
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          commit-message: "chore: gerar rascunho de post semanal"
          title: "Rascunho: post semanal (harmonização)"
          body: "Gerado automaticamente pelo workflow semanal."
          branch: "automation/weekly-post"
          labels: automation
          add-paths: |
            content/weekly-posts/*.md
            content/weekly-posts/*.json

      - name: Auto-approve and auto-merge
        if: steps.cpr.outputs.pull-request-number != '' && secrets.GH_PAT != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUMBER="${{ steps.cpr.outputs.pull-request-number }}"
          echo "Auto-approving PR #${PR_NUMBER}"
          gh pr review "${PR_NUMBER}" --approve --repo "${{ github.repository }}"
          echo "Enabling auto-merge for PR #${PR_NUMBER}"
          gh pr merge "${PR_NUMBER}" --squash --auto --delete-branch --repo "${{ github.repository }}" || true

      - name: Manual PR link (if needed)
        run: |
          echo "Se a criação automática de PR falhar por permissão, abra manualmente:"
          echo "https://github.com/${{ github.repository }}/pull/new/automation/weekly-post"
